<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — MINI ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="page-loader" id="pageLoader">
  <div style="text-align:center">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;color:#fff;"><i class="fas fa-industry"></i></div>
    <div class="loader-ring"></div>
  </div>
</div>
<div id="sidebar-container"></div>
<div class="main-wrapper">
  <div id="topbar-container"></div>
  <main class="main-content" id="appContent">
    <div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;font-size:2rem;color:var(--primary)"></i><h5 style="margin-top:1rem">Loading...</h5></div>
  </main>
</div>
<div id="modal-container"></div>
<script src="/static/js/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  if (!initPage('reports', 'Reports')) return;
  initModule();
});

function initModule() {
  document.getElementById('appContent').innerHTML = `
    <div class="page-header fade-in">
      <div class="page-header-left"><h1>Reports & Analytics</h1><p>Business insights at a glance</p></div>
    </div>
    <div class="grid grid-3 fade-in" style="margin-bottom:1.5rem">
      <div class="stat-card primary"><div class="stat-icon"><i class="fas fa-rupee-sign"></i></div><div class="stat-body"><div class="stat-value" id="rRevenue">—</div><div class="stat-label">Total Revenue (30d)</div></div></div>
      <div class="stat-card success"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-body"><div class="stat-value" id="rOrders">—</div><div class="stat-label">Sales Orders</div></div></div>
      <div class="stat-card info"><div class="stat-icon"><i class="fas fa-truck"></i></div><div class="stat-body"><div class="stat-value" id="rPO">—</div><div class="stat-label">Purchase Orders</div></div></div>
    </div>
    <div class="grid grid-2" style="margin-bottom:1.5rem">
      <div class="card fade-in"><div class="card-header"><h5><i class="fas fa-chart-bar"></i> Monthly Sales Trend</h5></div><div class="card-body"><div style="height:260px"><canvas id="salesChart"></canvas></div></div></div>
      <div class="card fade-in fade-in-delay-1"><div class="card-header"><h5><i class="fas fa-chart-pie"></i> Inventory Distribution</h5></div><div class="card-body"><div style="height:260px"><canvas id="invChart"></canvas></div></div></div>
    </div>
    <div class="card fade-in">
      <div class="card-header"><h5><i class="fas fa-file-export"></i> Export Reports</h5></div>
      <div class="card-body">
        <div class="grid grid-4" style="gap:.75rem">
          ${[['Sales Report','fa-file-invoice-dollar','primary','sales'],['Purchase Report','fa-truck','info','purchase'],['Inventory Report','fa-warehouse','success','inventory'],['Stock Ledger','fa-clipboard-list','warning','stock-ledger']].map(([l,i,c,t])=>`
          <div style="border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .2s" onclick="exportReport('${t}')" onmouseenter="this.style.borderColor='var(--primary)';this.style.background='rgba(99,102,241,.05)'" onmouseleave="this.style.borderColor='var(--border)';this.style.background='transparent'">
            <i class="fas ${i}" style="font-size:2rem;color:var(--${c});margin-bottom:.75rem;display:block"></i>
            <div style="font-weight:700;color:var(--text-primary)">${l}</div>
            <div style="font-size:.78rem;color:var(--text-muted);margin-top:.25rem">Excel export</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  loadReportData();
}

async function loadReportData() {
  try {
    const data = await API.get('/dashboard/stats');
    const kpi = data?.kpis || data || {};
    document.getElementById('rRevenue').textContent = UI.currency(kpi.monthly_revenue||0);
    document.getElementById('rOrders').textContent  = UI.number(kpi.so_this_month||kpi.total_so||0);
    document.getElementById('rPO').textContent      = UI.number(kpi.total_po||0);

    const trend = data?.sales_trend || [];
    const invCat = data?.inventory_by_category || [];

    const sCtx = document.getElementById('salesChart').getContext('2d');
    new Chart(sCtx, {
      type:'bar',
      data:{ labels:trend.map(t=>t.month||''), datasets:[{ label:'Revenue', data:trend.map(t=>parseFloat(t.revenue||0)), backgroundColor:'rgba(99,102,241,.7)', borderRadius:6 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{grid:{display:false}}, y:{beginAtZero:true, ticks:{callback:v=>'Rs.'+v.toLocaleString('en-IN')}} } }
    });

    if (invCat.length) {
      const iCtx = document.getElementById('invChart').getContext('2d');
      new Chart(iCtx, {
        type:'doughnut',
        data:{ labels:invCat.map(c=>c.category_name||c.name||'Other'), datasets:[{ data:invCat.map(c=>parseFloat(c.total_value||c.value||0)), backgroundColor:['#6366f1','#8b5cf6','#ec4899','#3b82f6','#10b981'], borderWidth:0 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{position:'bottom', labels:{padding:12, usePointStyle:true}} } }
      });
    }
  } catch(e) { console.error(e); }
}

function exportReport(type) {
  Toast.info('Preparing export...');
  const token = Auth.getToken();
  const baseUrl = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? `${location.protocol}//${location.hostname}:8000` : '';
  window.open(`${baseUrl}/api/v1/reports/${type}/export?token=${encodeURIComponent(token||'')}`, '_blank');
}

</script>
</body>
</html>
