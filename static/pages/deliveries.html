<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deliveries — MINI ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="page-loader" id="pageLoader">
  <div style="text-align:center">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;color:#fff;"><i class="fas fa-industry"></i></div>
    <div class="loader-ring"></div>
  </div>
</div>
<div id="sidebar-container"></div>
<div class="main-wrapper">
  <div id="topbar-container"></div>
  <main class="main-content" id="appContent">
    <div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;font-size:2rem;color:var(--primary)"></i><h5 style="margin-top:1rem">Loading...</h5></div>
  </main>
</div>
<div id="modal-container"></div>
<script src="/static/js/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  if (!initPage('deliveries', 'Deliveries')) return;
  initModule();
});

let currentPage = 1, searchQ = '';

/* ── Status display config ─────────────────────────────────────────── */
const STATUS_CFG = {
  confirmed:  { label: 'Ready to Ship', color: '#6366f1', bg: '#ede9fe', icon: 'fa-box-open' },
  dispatched: { label: 'Dispatched',    color: '#f59e0b', bg: '#fef3c7', icon: 'fa-truck' },
  delivered:  { label: 'Delivered',     color: '#10b981', bg: '#d1fae5', icon: 'fa-circle-check' },
};

function deliveryBadge(status) {
  const cfg = STATUS_CFG[status] || { label: status, color: '#64748b', bg: '#f1f5f9', icon: 'fa-circle' };
  return `<span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:700;
          padding:.22rem .6rem;border-radius:999px;background:${cfg.bg};color:${cfg.color}">
          <i class="fas ${cfg.icon}" style="font-size:.65rem"></i>${cfg.label}</span>`;
}

function initModule() {
  document.getElementById('appContent').innerHTML = `
    <div class="page-header fade-in">
      <div class="page-header-left">
        <h1>Deliveries</h1>
        <p>Track and manage order dispatches &amp; deliveries</p>
      </div>
    </div>

    <!-- KPI strip -->
    <div id="kpiStrip" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem"></div>

    <div class="card fade-in">
      <div class="card-header" style="flex-wrap:wrap;gap:.75rem;">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search by order # or customer..." oninput="onSearch(this.value)">
        </div>
        <select class="form-control" id="statusFilter" onchange="loadData(1)" style="width:175px">
          <option value="">All Deliveries</option>
          <option value="confirmed">Ready to Ship</option>
          <option value="dispatched">Dispatched</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>
      <div id="tableWrap" class="card-body p-0"></div>
      <div id="pagination"></div>
    </div>

    <!-- Detail modal -->
    <div class="modal" id="detailModal">
      <div class="modal-backdrop" onclick="closeDetail()"></div>
      <div class="modal-dialog" style="max-width:520px;width:95vw">
        <div class="modal-header">
          <div class="modal-title" id="detailTitle">Order Details</div>
          <button class="modal-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer" id="detailFooter"></div>
      </div>
    </div>`;

  loadKPIs();
  loadData(1);
}

let searchTimer;
function onSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ searchQ=v; loadData(1); }, 400); }

async function loadKPIs() {
  try {
    const [ready, dispatched, delivered] = await Promise.all([
      API.get('/deliveries', { page_size:1, status:'confirmed'   }).then(d => d?.meta?.total || 0),
      API.get('/deliveries', { page_size:1, status:'dispatched'  }).then(d => d?.meta?.total || 0),
      API.get('/deliveries', { page_size:1, status:'delivered'   }).then(d => d?.meta?.total || 0),
    ]);
    document.getElementById('kpiStrip').innerHTML = [
      { label:'Ready to Ship', val: ready,      icon:'fa-box-open',     c1:'#6366f1', c2:'#8b5cf6' },
      { label:'Dispatched',    val: dispatched,  icon:'fa-truck',        c1:'#f59e0b', c2:'#d97706' },
      { label:'Delivered',     val: delivered,   icon:'fa-circle-check', c1:'#10b981', c2:'#059669' },
    ].map(k => `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.25rem;
                  display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow-sm)">
        <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,${k.c1},${k.c2});
                    display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fas ${k.icon}" style="color:#fff;font-size:1.1rem"></i>
        </div>
        <div>
          <div style="font-size:1.6rem;font-weight:800;color:var(--text-primary);line-height:1">${k.val}</div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:.15rem">${k.label}</div>
        </div>
      </div>`).join('');
  } catch(e) {}
}

async function loadData(page=1) {
  currentPage = page;
  document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;color:var(--primary)"></i></div>`;
  try {
    const sf   = document.getElementById('statusFilter')?.value || '';
    const data = await API.get('/deliveries', { page, page_size:15, search:searchQ, status:sf });
    const items = data?.items || [];
    const meta  = data?.meta  || {};

    if (!items.length) {
      document.getElementById('tableWrap').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-truck-fast"></i>
          <h5>No deliveries found</h5>
          <p>Confirmed sales orders will appear here for dispatch</p>
        </div>`;
      return;
    }

    document.getElementById('tableWrap').innerHTML = `
      <div class="table-responsive"><table class="table">
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Order Date</th>
            <th>Expected Delivery</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(o => {
            const overdue = o.expected_delivery_date && o.status !== 'delivered'
              && new Date(o.expected_delivery_date) < new Date();
            return `<tr>
              <td>
                <span style="color:var(--primary);font-weight:700;cursor:pointer" onclick="openDetail(${o.id})">${o.order_number}</span>
              </td>
              <td>
                <div style="font-weight:600">${o.customer_name||'—'}</div>
                ${o.customer_phone ? `<div style="font-size:.72rem;color:var(--text-muted)">${o.customer_phone}</div>` : ''}
              </td>
              <td style="color:var(--text-muted)">${UI.date(o.order_date)}</td>
              <td>
                ${o.expected_delivery_date
                  ? `<span style="color:${overdue ? '#ef4444' : 'var(--text-muted)'}">
                      ${overdue ? '<i class="fas fa-exclamation-triangle" style="margin-right:.25rem;font-size:.75rem"></i>' : ''}
                      ${UI.date(o.expected_delivery_date)}
                     </span>`
                  : '<span style="color:var(--text-muted)">—</span>'}
              </td>
              <td><strong>${UI.currency(o.total_amount)}</strong></td>
              <td>${deliveryBadge(o.status)}</td>
              <td><div class="table-actions">
                <button class="btn btn-sm btn-outline" onclick="openDetail(${o.id})" title="View Details">
                  <i class="fas fa-eye"></i>
                </button>
                ${o.status === 'confirmed'
                  ? `<button class="btn btn-sm" onclick="dispatch(${o.id})" title="Mark as Dispatched"
                       style="background:#fef3c7;color:#b45309;border:1px solid #fde68a">
                       <i class="fas fa-truck"></i> Dispatch
                     </button>`
                  : ''}
                ${o.status === 'dispatched'
                  ? `<button class="btn btn-sm" onclick="markDelivered(${o.id})" title="Mark as Delivered"
                       style="background:#d1fae5;color:#065f46;border:1px solid #a7f3d0">
                       <i class="fas fa-circle-check"></i> Delivered
                     </button>`
                  : ''}
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`;

    UI.renderPagination('pagination', { page: meta.page||page, pages: meta.pages||1, total: meta.total||items.length }, 'loadData');
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>${e.message}</h5></div>`;
  }
}

async function dispatch(id) {
  if (!confirm('Mark this order as Dispatched?')) return;
  try {
    await API.post(`/sales/orders/${id}/dispatch`, {});
    Toast.success('Order marked as Dispatched');
    loadKPIs(); loadData(currentPage);
  } catch(e) { Toast.error(e.message); }
}

async function markDelivered(id) {
  if (!confirm('Mark this order as Delivered? This cannot be undone.')) return;
  try {
    await API.post(`/sales/orders/${id}/deliver`, {});
    Toast.success('Order marked as Delivered!');
    loadKPIs(); loadData(currentPage);
  } catch(e) { Toast.error(e.message); }
}

async function openDetail(id) {
  document.getElementById('detailModal').classList.add('show');
  document.getElementById('detailBody').innerHTML = `<div style="text-align:center;padding:2rem"><i class="fas fa-spinner fa-spin" style="color:var(--primary);font-size:1.5rem"></i></div>`;
  document.getElementById('detailFooter').innerHTML = '';
  try {
    const o = await API.get(`/sales/orders/${id}`);
    const cfg = STATUS_CFG[o.status] || { label: o.status, color:'#64748b', bg:'#f1f5f9', icon:'fa-circle' };
    const overdue = o.expected_delivery_date && o.status !== 'delivered'
      && new Date(o.expected_delivery_date) < new Date();

    document.getElementById('detailTitle').textContent = `Delivery — ${o.order_number}`;
    document.getElementById('detailBody').innerHTML = `
      <!-- Status banner -->
      <div style="background:${cfg.bg};border:1px solid ${cfg.color}22;border-radius:10px;
                  padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
        <div style="width:36px;height:36px;border-radius:9px;background:${cfg.color};
                    display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fas ${cfg.icon}" style="color:#fff"></i>
        </div>
        <div>
          <div style="font-weight:700;color:${cfg.color}">${cfg.label}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">Current delivery status</div>
        </div>
        ${overdue ? `<span style="margin-left:auto;font-size:.72rem;font-weight:700;color:#ef4444;background:#fef2f2;padding:.2rem .55rem;border-radius:999px">
          <i class="fas fa-clock"></i> Overdue</span>` : ''}
      </div>

      <!-- Info grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.1rem">
        ${[
          ['Order #',    o.order_number,                                   'fa-hashtag'],
          ['Customer',   o.customer?.company_name || o.customer_name||'—', 'fa-building'],
          ['Order Date', UI.date(o.order_date),                            'fa-calendar'],
          ['Expected',   UI.date(o.expected_delivery_date)||'—',           'fa-calendar-check'],
          ['Amount',     UI.currency(o.total_amount),                      'fa-rupee-sign'],
          ['Notes',      o.notes||'—',                                     'fa-sticky-note'],
        ].map(([lbl,val,ico]) => `
          <div style="background:var(--bg-card2);border:1px solid var(--border);border-radius:9px;padding:.65rem .85rem">
            <div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;
                        font-weight:600;margin-bottom:.2rem"><i class="fas ${ico}" style="margin-right:.3rem"></i>${lbl}</div>
            <div style="font-weight:600;color:var(--text-primary);font-size:.85rem">${val}</div>
          </div>`).join('')}
      </div>

      <!-- Delivery timeline -->
      <div style="font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;
                  letter-spacing:.08em;margin-bottom:.65rem">Delivery Progress</div>
      <div style="display:flex;align-items:center;gap:0">
        ${['confirmed','dispatched','delivered'].map((s,i,arr) => {
          const done    = ['confirmed','dispatched','delivered'].indexOf(o.status) >= i;
          const active  = o.status === s;
          const sCfg    = STATUS_CFG[s];
          return `
            <div style="flex:1;text-align:center">
              <div style="width:32px;height:32px;border-radius:50%;margin:0 auto;
                          background:${done ? sCfg.color : 'var(--border)'};
                          display:flex;align-items:center;justify-content:center;
                          box-shadow:${active ? `0 0 0 4px ${sCfg.color}33` : 'none'};
                          transition:all .3s">
                <i class="fas ${done ? 'fa-check' : sCfg.icon}" style="color:${done ? '#fff' : 'var(--text-muted)'};font-size:.7rem"></i>
              </div>
              <div style="font-size:.68rem;font-weight:${active?'700':'500'};
                          color:${active ? sCfg.color : 'var(--text-muted)'};margin-top:.3rem">${sCfg.label}</div>
            </div>
            ${i < arr.length-1 ? `<div style="flex:2;height:2px;background:${done && o.status !== s ? sCfg.color : 'var(--border)'};margin-bottom:1.2rem"></div>` : ''}`;
        }).join('')}
      </div>`;

    // Action buttons in footer
    let footerBtns = `<button class="btn btn-outline" onclick="closeDetail()">Close</button>`;
    if (o.status === 'confirmed')
      footerBtns += `<button class="btn" style="background:#fef3c7;color:#b45309;border:1px solid #fde68a;font-weight:700"
                      onclick="closeDetail();dispatch(${id})"><i class="fas fa-truck"></i> Mark Dispatched</button>`;
    if (o.status === 'dispatched')
      footerBtns += `<button class="btn" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:700"
                      onclick="closeDetail();markDelivered(${id})"><i class="fas fa-circle-check"></i> Mark Delivered</button>`;

    document.getElementById('detailFooter').innerHTML = footerBtns;
  } catch(e) {
    document.getElementById('detailBody').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>${e.message}</h5></div>`;
  }
}

function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }
</script>
</body>
</html>
