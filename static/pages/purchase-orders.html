<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Orders — MINI ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  
</head>
<body>
<div class="page-loader" id="pageLoader">
  <div style="text-align:center">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;color:#fff;"><i class="fas fa-industry"></i></div>
    <div class="loader-ring"></div>
  </div>
</div>
<div id="sidebar-container"></div>
<div class="main-wrapper">
  <div id="topbar-container"></div>
  <main class="main-content" id="appContent">
    <div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;font-size:2rem;color:var(--primary)"></i><h5 style="margin-top:1rem">Loading...</h5></div>
  </main>
</div>
<div id="modal-container"></div>
<script src="/static/js/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  if (!initPage('purchase-orders', 'Purchase Orders')) return;
  initModule();
});

let currentPage = 1, searchQ = '', vendors = [], products = [];

function initModule() {
  document.getElementById('appContent').innerHTML = `
    <div class="page-header fade-in">
      <div class="page-header-left"><h1>Purchase Orders</h1><p>Manage supplier purchase orders</p></div>
      <button class="btn btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> New Purchase Order</button>
    </div>
    <div class="card fade-in">
      <div class="card-header" style="flex-wrap:wrap;gap:.75rem;">
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search orders..." oninput="onSearch(this.value)"></div>
        <select class="form-control" id="statusFilter" onchange="loadData(1)" style="width:160px">
          <option value="">All Status</option><option value="draft">Draft</option><option value="confirmed">Confirmed</option><option value="fully_received">Received</option><option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div id="tableWrap" class="card-body p-0"></div>
      <div id="pagination"></div>
    </div>
    <div class="modal" id="poModal">
      <div class="modal-backdrop" onclick="closeModal()"></div>
      <div class="modal-dialog modal-xl">
        <div class="modal-header"><div class="modal-title">New Purchase Order</div><button class="modal-close" onclick="closeModal()">x</button></div>
        <div class="modal-body">
          <div class="grid grid-3">
            <div class="form-group"><label class="form-label">Vendor *</label><select class="form-control" id="fVend"><option value="">Select...</option></select></div>
            <div class="form-group"><label class="form-label">Order Date *</label><input class="form-control" id="fDate" type="date"></div>
            <div class="form-group"><label class="form-label">Expected Receipt Date</label><input class="form-control" id="fRecDate" type="date"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin:.75rem 0 .5rem">
            <label class="form-label" style="margin:0;font-weight:600">Order Items</label>
            <button type="button" class="btn btn-sm btn-outline" onclick="addLine()"><i class="fas fa-plus"></i> Add Item</button>
          </div>
          <div class="table-responsive">
            <table class="table" style="font-size:.825rem"><thead><tr><th>Product</th><th style="width:90px">Qty</th><th style="width:130px">Unit Price</th><th style="width:80px">Tax%</th><th style="width:120px">Total</th><th style="width:40px"></th></tr></thead>
            <tbody id="linesBody"></tbody></table>
          </div>
          <div style="text-align:right;font-weight:700;color:var(--text-primary);margin-top:.5rem">Grand Total: <span id="orderTotal">Rs.0.00</span></div>
          <div class="form-group" style="margin-top:.75rem"><label class="form-label">Notes</label><textarea class="form-control" id="fNotes" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="saveBtn" onclick="save()"><i class="fas fa-save"></i> Save</button>
        </div>
      </div>
    </div>`;
  loadMasters(); loadData(1);
  if (new URLSearchParams(location.search).get('action') === 'create') setTimeout(openCreateModal, 700);
}

async function loadMasters() {
  try {
    [vendors, products] = await Promise.all([
      API.get('/purchase/vendors', {page_size:500}).then(d=>d?.items||d?.vendors||d||[]),
      API.get('/products/', {page_size:500}).then(d=>d?.items||d?.products||d||[])
    ]);
    const sel = document.getElementById('fVend');
    if (sel) vendors.forEach(v=>{ const o=document.createElement('option'); o.value=v.id; o.textContent=v.company_name; sel.appendChild(o); });
  } catch(e) {}
}

let searchTimer, lineCount=0;
function onSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ searchQ=v; loadData(1); },400); }

async function loadData(page=1) {
  currentPage = page;
  document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;color:var(--primary)"></i></div>`;
  try {
    const sf = document.getElementById('statusFilter')?.value||'';
    const data = await API.get('/purchase/orders', { page, page_size:15, search:searchQ, status:sf });
    const items = data?.items || data?.purchase_orders || [];
    const meta  = data?.meta || data?.pagination || {};
    if (!items.length) { document.getElementById('tableWrap').innerHTML=`<div class="empty-state"><i class="fas fa-truck"></i><h5>No purchase orders</h5><button class="btn btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> New Order</button></div>`; return; }
    document.getElementById('tableWrap').innerHTML = `
      <div class="table-responsive"><table class="table">
        <thead><tr><th>PO #</th><th>Vendor</th><th>Date</th><th>Expected Receipt</th><th>Amount</th><th>Auto</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${items.map(o=>`<tr>
          <td><span style="color:var(--primary);font-weight:700">${o.order_number}</span></td>
          <td style="font-weight:600">${o.vendor?.company_name||'—'}</td>
          <td style="color:var(--text-muted)">${UI.date(o.order_date)}</td>
          <td style="color:var(--text-muted)">${UI.date(o.expected_receipt_date)}</td>
          <td><strong>${UI.currency(o.total_amount)}</strong></td>
          <td>${o.auto_generated?'<span class="badge badge-info">Auto</span>':'—'}</td>
          <td>${UI.badge(o.status)}</td>
          <td><div class="table-actions">
            ${o.status==='draft'?`<button class="btn btn-sm btn-primary" onclick="confirmPO(${o.id})" title="Confirm"><i class="fas fa-check"></i></button>`:''}
            ${o.status==='confirmed'?`<button class="btn btn-sm btn-success" onclick="receivePO(${o.id})" title="Receive Goods"><i class="fas fa-truck-loading"></i></button>`:''}
            ${o.status==='draft'?`<button class="btn btn-sm btn-danger" onclick="cancelPO(${o.id})" title="Cancel"><i class="fas fa-times"></i></button>`:''}
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    UI.renderPagination('pagination', { page:meta.page||page, pages:meta.pages||1, total:meta.total||items.length }, 'loadData');
  } catch(e) { document.getElementById('tableWrap').innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>${e.message}</h5></div>`; }
}

function openCreateModal() {
  lineCount = 0;
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fRecDate').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('linesBody').innerHTML = '';
  document.getElementById('orderTotal').textContent = 'Rs.0.00';
  if (vendors.length === 0) loadMasters().then(()=>addLine()); else addLine();
  document.getElementById('poModal').classList.add('show');
}
function closeModal() { document.getElementById('poModal').classList.remove('show'); }

function addLine() {
  const id = ++lineCount;
  const opts = products.map(p=>`<option value="${p.id}" data-price="${p.cost_price||p.sale_price||0}">${p.product_name}</option>`).join('');
  const row = document.createElement('tr');
  row.id = `line_${id}`;
  row.innerHTML = `<td><select class="form-control" id="lprod_${id}" onchange="lineChange(${id})" style="min-width:160px"><option value="">Select...</option>${opts}</select></td>
    <td><input class="form-control" id="lqty_${id}" type="number" value="1" min="0.001" step="0.001" oninput="calcTotal()"></td>
    <td><input class="form-control" id="lprice_${id}" type="number" step="0.01" value="0" oninput="calcTotal()"></td>
    <td><input class="form-control" id="ltax_${id}" type="number" step="0.01" value="0" oninput="calcTotal()" style="width:70px"></td>
    <td id="ltotal_${id}" style="font-weight:700;vertical-align:middle;white-space:nowrap">Rs.0.00</td>
    <td><button type="button" class="btn btn-sm btn-danger" onclick="document.getElementById('line_${id}').remove();calcTotal()"><i class="fas fa-times"></i></button></td>`;
  document.getElementById('linesBody').appendChild(row);
}

function lineChange(id) {
  const sel = document.getElementById(`lprod_${id}`);
  const price = parseFloat(sel.selectedOptions[0]?.dataset.price||0);
  document.getElementById(`lprice_${id}`).value = price.toFixed(2);
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('[id^="lqty_"]').forEach(el => {
    const id = el.id.replace('lqty_','');
    const qty = parseFloat(el.value)||0, price = parseFloat(document.getElementById(`lprice_${id}`)?.value)||0, tax = parseFloat(document.getElementById(`ltax_${id}`)?.value)||0;
    const base = qty*price, t = base + base*tax/100; total += t;
    const tel = document.getElementById(`ltotal_${id}`); if (tel) tel.textContent = UI.currency(t);
  });
  document.getElementById('orderTotal').textContent = UI.currency(total);
}

async function save() {
  const btn = document.getElementById('saveBtn');
  const items = [];
  document.querySelectorAll('[id^="lprod_"]').forEach(sel => {
    if (!sel.value) return;
    const id = sel.id.replace('lprod_','');
    items.push({ product_id:parseInt(sel.value), ordered_qty:parseFloat(document.getElementById(`lqty_${id}`)?.value)||1, unit_price:parseFloat(document.getElementById(`lprice_${id}`)?.value)||0, tax_pct:parseFloat(document.getElementById(`ltax_${id}`)?.value)||0 });
  });
  if (!document.getElementById('fVend').value) { Toast.error('Select a vendor'); return; }
  if (!items.length) { Toast.error('Add at least one item'); return; }
  const body = { vendor_id:parseInt(document.getElementById('fVend').value), order_date:document.getElementById('fDate').value, expected_receipt_date:document.getElementById('fRecDate').value||null, notes:document.getElementById('fNotes').value, items };
  Loader.btn(btn, true);
  try {
    await API.post('/purchase/orders', body);
    Toast.success('Purchase order created!');
    closeModal(); loadData(currentPage);
  } catch(e) { Toast.error(e.message); } finally { Loader.btn(btn, false); }
}

async function confirmPO(id) {
  if (!confirm('Confirm this purchase order?')) return;
  try { await API.post(`/purchase/orders/${id}/confirm`, {}); Toast.success('PO Confirmed'); loadData(currentPage); } catch(e) { Toast.error(e.message); }
}
async function receivePO(id) {
  if (!confirm('Mark all items as received? This will update stock levels.')) return;
  try { await API.post(`/purchase/orders/${id}/receive`, {}); Toast.success('Goods received! Stock updated.'); loadData(currentPage); } catch(e) { Toast.error(e.message); }
}
async function cancelPO(id) {
  if (!confirm('Cancel this order?')) return;
  try { await API.post(`/purchase/orders/${id}/cancel`, {}); Toast.success('Cancelled'); loadData(currentPage); } catch(e) { Toast.error(e.message); }
}

</script>
</body>
</html>
