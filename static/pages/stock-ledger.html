<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Ledger — MINI ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  
</head>
<body>
<div class="page-loader" id="pageLoader">
  <div style="text-align:center">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;color:#fff;"><i class="fas fa-industry"></i></div>
    <div class="loader-ring"></div>
  </div>
</div>
<div id="sidebar-container"></div>
<div class="main-wrapper">
  <div id="topbar-container"></div>
  <main class="main-content" id="appContent">
    <div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;font-size:2rem;color:var(--primary)"></i><h5 style="margin-top:1rem">Loading...</h5></div>
  </main>
</div>
<div id="modal-container"></div>
<script src="/static/js/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  if (!initPage('stock-ledger', 'Stock Ledger')) return;
  initModule();
});

let currentPage = 1, searchQ = '';

function initModule() {
  document.getElementById('appContent').innerHTML = `
    <div class="page-header fade-in">
      <div class="page-header-left"><h1>Stock Ledger</h1><p>Complete history of all stock movements</p></div>
    </div>
    <div class="card fade-in">
      <div class="card-header" style="flex-wrap:wrap;gap:.75rem;">
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search product ID..." oninput="onSearch(this.value)"></div>
        <select class="form-control" id="typeFilter" style="width:180px" onchange="loadData(1)">
          <option value="">All Types</option>
          <option value="purchase_receipt">Purchase Receipt</option>
          <option value="sale_delivery">Sale Delivery</option>
          <option value="manual_adjustment">Adjustment</option>
          <option value="production_output">Production Output</option>
          <option value="production_consumption">Production Consumption</option>
        </select>
      </div>
      <div id="tableWrap" class="card-body p-0"></div>
      <div id="pagination"></div>
    </div>`;
  loadData(1);
}

let searchTimer;
function onSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ searchQ=v; loadData(1); },400); }

async function loadData(page=1) {
  currentPage = page;
  document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;color:var(--primary)"></i></div>`;
  try {
    const tf = document.getElementById('typeFilter')?.value||'';
    const data = await API.get('/inventory/ledger', { page, page_size:25, movement_type:tf });
    const items = data?.items || [];
    const meta  = data?.meta || data?.pagination || {};
    const typeColor = { purchase_receipt:'badge-success', sale_delivery:'badge-danger', manual_adjustment:'badge-warning', production_output:'badge-primary', production_consumption:'badge-info' };
    if (!items.length) { document.getElementById('tableWrap').innerHTML=`<div class="empty-state"><i class="fas fa-clipboard-list"></i><h5>No ledger entries</h5></div>`; return; }
    document.getElementById('tableWrap').innerHTML = `
      <div class="table-responsive"><table class="table">
        <thead><tr><th>Date</th><th>Product</th><th>Movement Type</th><th>Qty Change</th><th>Balance</th><th>Unit Cost</th><th>Reference</th><th>Notes</th></tr></thead>
        <tbody>${items.map(e=>`<tr>
          <td style="color:var(--text-muted);white-space:nowrap;font-size:.8rem">${UI.date(e.movement_date)}</td>
          <td><div style="font-weight:600;font-size:.825rem">${e.product_name||'—'}</div><div style="font-size:.72rem;color:var(--text-muted)">${e.product_code||''}</div></td>
          <td><span class="badge ${typeColor[e.movement_type]||'badge-secondary'}" style="font-size:.7rem">${(e.movement_type||'').replace(/_/g,' ')}</span></td>
          <td style="font-weight:700;color:${parseFloat(e.quantity||0)>0?'var(--success)':'var(--danger)'}">${parseFloat(e.quantity||0)>0?'+':''}${UI.number(e.quantity||0)}</td>
          <td><strong>${UI.number(e.balance_qty||0)}</strong></td>
          <td style="color:var(--text-muted)">${UI.currency(e.unit_cost||0)}</td>
          <td style="font-size:.78rem;color:var(--text-muted)">${e.reference_number||'—'}</td>
          <td style="font-size:.78rem;color:var(--text-muted)">${e.notes||'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    UI.renderPagination('pagination', { page:meta.page||page, pages:meta.pages||1, total:meta.total||items.length }, 'loadData');
  } catch(e) { document.getElementById('tableWrap').innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>${e.message}</h5></div>`; }
}

</script>
</body>
</html>
